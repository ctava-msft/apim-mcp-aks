apiVersion: apps/v1
kind: Deployment
metadata:
  name: um-autonomous-agent
  namespace: mcp-agents
  labels:
    app: um-autonomous-agent
    agent: utilization-management
spec:
  replicas: 2
  selector:
    matchLabels:
      app: um-autonomous-agent
  template:
    metadata:
      labels:
        app: um-autonomous-agent
        azure.workload.identity/use: "true"
        agent: utilization-management
      annotations:
        entra.agent-id/enabled: "true"
    spec:
      serviceAccountName: mcp-agents-sa
      containers:
      - name: um-autonomous-agent
        image: ${CONTAINER_REGISTRY}/um-autonomous-agent:${IMAGE_TAG}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
          name: http
          protocol: TCP
        env:
        # =========================================
        # Entra Agent Identity Configuration
        # =========================================
        - name: AGENT_IDENTITY_ENABLED
          value: "true"
        - name: AZURE_CLIENT_ID
          value: "${AGENT_IDENTITY_APP_ID}"
        # =========================================
        # Azure AI Foundry Configuration
        # =========================================
        - name: FOUNDRY_PROJECT_ENDPOINT
          value: "${FOUNDRY_PROJECT_ENDPOINT}"
        - name: AZURE_AI_PROJECT_ENDPOINT
          value: "${FOUNDRY_PROJECT_ENDPOINT}"
        - name: FOUNDRY_MODEL_DEPLOYMENT_NAME
          value: "${FOUNDRY_MODEL_DEPLOYMENT_NAME}"
        - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
          value: "${FOUNDRY_MODEL_DEPLOYMENT_NAME}"
        - name: EMBEDDING_MODEL_DEPLOYMENT_NAME
          value: "${EMBEDDING_MODEL_DEPLOYMENT_NAME}"
        # =========================================
        # CosmosDB Configuration
        # =========================================
        - name: COSMOSDB_ENDPOINT
          value: "${COSMOSDB_ENDPOINT}"
        - name: COSMOSDB_DATABASE_NAME
          value: "${COSMOSDB_DATABASE_NAME}"
        # =========================================
        # Azure AI Search Configuration (UM Knowledge Base)
        # =========================================
        - name: AZURE_SEARCH_ENDPOINT
          value: "${AZURE_SEARCH_ENDPOINT}"
        - name: AZURE_SEARCH_INDEX_NAME
          value: "um-policies"
        - name: AZURE_SEARCH_KNOWLEDGE_BASE_NAME
          value: "um-knowledge-base"
        # =========================================
        # Agent Lightning Configuration
        # =========================================
        - name: LIGHTNING_AGENT_ID
          value: "um-agent"
        - name: ENABLE_LIGHTNING_CAPTURE
          value: "${ENABLE_LIGHTNING_CAPTURE}"
        - name: USE_TUNED_MODEL
          value: "${USE_TUNED_MODEL}"
        - name: TUNED_MODEL_DEPLOYMENT_NAME
          value: "${TUNED_MODEL_DEPLOYMENT_NAME}"
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: tmp-volume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: um-autonomous-agent
  namespace: mcp-agents
  labels:
    app: um-autonomous-agent
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8001
    protocol: TCP
    name: http
  selector:
    app: um-autonomous-agent
